<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'"
    />
    <title>UmlTool</title>
  </head>
  <body>
    <div id="app">
      <header id="toolbar"></header>
      <main id="workspace">
        <section id="text-pane">
          <div class="pane-title">テキスト入力（初期生成）</div>
          <textarea id="text-input" spellcheck="false" placeholder="participant ユーザー&#10;participant サーバー&#10;ユーザー -> サーバー : ログイン要求&#10;サーバー --> ユーザー : 応答"></textarea>
          <button id="generate-btn" type="button">テキストから図を生成 →</button>
          <div id="text-error" class="text-error"></div>
        </section>
        <section id="canvas-pane">
          <div id="graph-container"></div>
        </section>
        <aside id="props-pane">
          <div class="pane-title">プロパティ</div>
          <div id="props-body"></div>
        </aside>
      </main>
      <footer id="statusbar"></footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
